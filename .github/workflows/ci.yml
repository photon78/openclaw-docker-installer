name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.5.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install ruff mypy

      - name: Ruff (linting)
        run: ruff check src/ tests/

      - name: Mypy (type checking)
        run: mypy src/

  test:
    name: Tests
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5.5.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Coverage report
        # Coverage is reported but not enforced — UI/wizard/docker code is
        # interactive and cannot be unit-tested without extensive mocking.
        # Generator modules (core logic) have high coverage; overall is ~26%.
        run: pytest tests/ --cov=src --cov-report=term-missing
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'

  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Build Docker image (if Dockerfile exists)
        run: |
          if [ -f Dockerfile ]; then
            docker build -t openclaw-installer-test .
          else
            echo "No Dockerfile yet — skipping Docker build test"
          fi
